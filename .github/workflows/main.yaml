# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: main
on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    # Work around jdx/mise-action not caching ~/.rustup alongside
    # ~/.local/share/mise, which causes Rust components (e.g. clippy) to go
    # missing on cache hits.  See: https://github.com/jdx/mise-action/issues/215
    - &cache-rustup
      uses: actions/cache@v5
      with:
        path: ~/.rustup/toolchains
        key: rustup-v1-${{ runner.os }}-${{ hashFiles('mise.toml') }}
    - &setup-mise
      uses: jdx/mise-action@v4
    - run: mise run check

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
        - ubuntu-latest
        - macos-latest
        - windows-latest
    steps:
    - uses: actions/checkout@v6
    - *cache-rustup
    - *setup-mise
    - run: mise run test
